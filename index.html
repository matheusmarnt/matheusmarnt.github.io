<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheus Mariano | Engenheiro de Software</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Alpine Plugins -->
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/intersect@3.x.x/dist/cdn.min.js"></script>
  <!-- Alpine Core -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-mono { font-family: 'Fira Code', monospace; }
    
    /* Cyberpunk Grid Background */
    .bg-grid {
      background-size: 40px 40px;
      background-image: 
        linear-gradient(to right, rgba(0, 240, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 240, 255, 0.05) 1px, transparent 1px);
    }
    
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 bg-grid relative selection:bg-cyan-500/30">

  <!-- Navbar -->
  <nav x-data="{ active: 'inicio' }" @active-section.window="active = $event.detail" class="border-b border-cyan-900/30 bg-slate-950/80 backdrop-blur-md fixed w-full z-50 shadow-[0_0_15px_rgba(0,240,255,0.1)]">
    <div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="#inicio" class="text-2xl font-bold text-white font-mono tracking-tight"><span class="text-cyan-400">&gt;</span> Matheus_Mariano</a>
      <div class="hidden md:flex gap-8 text-sm font-medium font-mono">
        <a href="#inicio" @click="active = 'inicio'" :class="active === 'inicio' ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]' : 'hover:text-cyan-400 transition'">~/inicio</a>
        <a href="#sobre" @click="active = 'sobre'" :class="active === 'sobre' ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]' : 'hover:text-cyan-400 transition'">~/sobre</a>
        <a href="#stack" @click="active = 'stack'" :class="active === 'stack' ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]' : 'hover:text-cyan-400 transition'">~/stack</a>
        <a href="#projetos" @click="active = 'projetos'" :class="active === 'projetos' ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]' : 'hover:text-cyan-400 transition'">~/projetos</a>
        <a href="#contato" @click="active = 'contato'" :class="active === 'contato' ? 'text-cyan-400 drop-shadow-[0_0_8px_rgba(0,240,255,0.8)]' : 'hover:text-cyan-400 transition'">~/contato</a>
      </div>
    </div>
  </nav>

  <main>
    <!-- Sections will go here -->
  </main>

  <footer class="bg-slate-950 border-t border-cyan-900/30 py-8 text-center text-sm text-slate-500 font-mono">
    <p>System.exit(0) // © 2026 Matheus Mariano • Gurupi, TO</p>
  </footer>

</body>
</html>
